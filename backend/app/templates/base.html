<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FinanceHub{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css" nonce="{{ csp_nonce }}">
    <script src="/static/js/htmx.min.js" nonce="{{ csp_nonce }}" defer></script>
    <script src="/static/js/alpine.min.js" nonce="{{ csp_nonce }}" defer></script>
</head>
<body x-data>
    <nav class="sidebar">
        <div class="logo">FinanceHub</div>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/accounts/">Accounts</a></li>
            <li><a href="/transactions/">Transactions</a></li>
            <li><a href="/budgets/">Budgets</a></li>
            <li><a href="/goals/">Goals</a></li>
            <li><a href="/health/">Health</a></li>
            <li><a href="/categories/">Categories</a></li>
            <li><a href="/nordigen/connect">Banks</a></li>
        </ul>
    </nav>
    <main class="content">
        {% set messages = messages | default([]) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash flash--{{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
