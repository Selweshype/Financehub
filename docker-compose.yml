networks:
  frontend:
    driver: bridge
    internal: false   # caddy needs internet for ACME/Let's Encrypt
  backend:
    driver: bridge
    internal: true    # no direct internet access from app

volumes:
  db_data:
  caddy_data:
  caddy_config:
  ml_models:
  restic_cache:

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - frontend
      - backend
    volumes:
      - db_data:/data
      - ml_models:/models
      - ./backend/scripts:/scripts:ro
      - /etc/financehub/age-key.txt:/secrets/age-key.txt:ro
      - ./secrets/secrets.enc.yaml:/secrets/secrets.enc.yaml:ro
    expose:
      - "8000"
    environment:
      - SOPS_AGE_KEY_FILE=/secrets/age-key.txt
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./static:/srv/static:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  backup:
    image: restic/restic:0.16.4
    restart: "no"
    networks: []
    volumes:
      - db_data:/data:ro
      - restic_cache:/root/.cache/restic
      - /etc/financehub/age-key.txt:/secrets/age-key.txt:ro
      - ./secrets/secrets.enc.yaml:/secrets/secrets.enc.yaml:ro
      - ./infra/restic/backup.sh:/backup.sh:ro
    environment:
      - SOPS_AGE_KEY_FILE=/secrets/age-key.txt
    entrypoint: ["/bin/sh", "/backup.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
